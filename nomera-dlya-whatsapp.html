<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Виртуальные номера для WhatsApp — ТОП сервисов 2026 | SMS-каталог</title>
<meta name="description" content="Сравниваем сервисы виртуальных номеров для регистрации в WhatsApp. GrizzlySMS, SMS-Man, OnlineSim и другие: цены, GEO, API, бесплатные варианты."/>
//fonts.googleapis.com"/>
//fonts.gstatic.com" crossorigin/>
//fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Manrope:wght@400..800&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f7f6f2;--surf:#ffffff;--surf2:#f0ede8;--border:#dedad3;--text:#1c1917;--muted:#78716c;--pri:#0d9488;--prih:#0f766e;--priacc:#ccfbf1;--shadow:0 1px 4px rgba(0,0,0,.07);--shadowmd:0 4px 16px rgba(0,0,0,.10);--r:10px;--rlg:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Inter",system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;font-size:1rem}
h1,h2,h3{font-family:"Manrope",system-ui,sans-serif;line-height:1.2}
a{color:var(--pri);text-decoration:none}a:hover{color:var(--prih)}
.container{max-width:1100px;margin:0 auto;padding:0 20px}
.nav{background:var(--surf);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
.nav-in{display:flex;align-items:center;padding:14px 0;gap:16px}
.logo{font-family:"Manrope",sans-serif;font-weight:800;font-size:1.05rem;color:var(--text);display:flex;align-items:center;gap:8px}
.logo em{color:var(--pri);font-style:normal}
.nav-links{display:flex;gap:4px;margin-left:auto;font-size:.83rem}
.nav-links a{padding:6px 12px;border-radius:8px;color:var(--muted)}
.nav-links a:hover{background:var(--surf2);color:var(--text)}
.hero{padding:56px 0 40px;background:linear-gradient(160deg,var(--surf) 0%,var(--bg) 100%);border-bottom:1px solid var(--border)}
.crumbs{font-size:.78rem;color:var(--muted);margin-bottom:12px}
.crumbs a{color:var(--muted)}.crumbs span{margin:0 4px}
.badge-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.badge{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:3px 12px;font-size:.73rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.badge-pri{background:var(--priacc);color:var(--prih)}
.badge-ghost{border:1px solid var(--border);color:var(--muted);background:transparent}
.hero h1{font-size:clamp(1.7rem,3.5vw,2.7rem);margin-bottom:12px}
.hero h1 span{color:var(--pri)}
.hero-desc{color:var(--muted);max-width:680px;margin-bottom:20px;font-size:.97rem}
.chips{display:flex;flex-wrap:wrap;gap:8px;font-size:.8rem}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--surf);border:1px solid var(--border);border-radius:999px;padding:4px 12px;color:var(--muted)}
.chip strong{color:var(--text)}
.section{padding:56px 0}
.sec-head{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;margin-bottom:28px}
.sec-head h2{font-size:clamp(1.2rem,2.4vw,1.65rem)}
.sec-head p{font-size:.88rem;color:var(--muted);max-width:500px}
.divider{border:none;border-top:1px solid var(--border);margin:0 0 48px}
.pills{display:flex;flex-wrap:wrap;gap:6px}
.pills button{border-radius:999px;border:1px solid var(--border);padding:5px 16px;background:var(--surf);color:var(--muted);cursor:pointer;font-size:.82rem;transition:all .15s;font-family:inherit}
.pills button.on{background:var(--priacc);color:var(--prih);border-color:transparent;font-weight:600}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--rlg);padding:22px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:14px;position:relative;transition:box-shadow .2s}
.card:hover{box-shadow:var(--shadowmd)}
.card.top{border-color:var(--pri)}
.card-badge{position:absolute;top:14px;right:14px;background:var(--priacc);color:var(--prih);font-size:.68rem;font-weight:700;text-transform:uppercase;border-radius:999px;padding:2px 9px;letter-spacing:.04em}
.card-head{display:flex;align-items:flex-start;gap:14px}
.card-icon{width:44px;height:44px;border-radius:13px;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.card-title{font-weight:700;font-size:1.02rem;margin-bottom:2px}
.card-rating{font-size:.8rem;color:var(--muted)}
.card-desc{font-size:.88rem;color:var(--muted)}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:.73rem;padding:2px 9px;border-radius:999px;background:var(--surf2);color:var(--muted)}
.card-specs{display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:.83rem}
.spec-label{font-size:.7rem;text-transform:uppercase;color:var(--muted);letter-spacing:.04em;display:block}
.spec-val{font-weight:600;display:block}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;padding-top:14px;border-top:1px solid var(--border);margin-top:auto}
.price-big{font-size:1.05rem;font-weight:700}
.price-note{font-size:.73rem;color:var(--muted)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 22px;border-radius:999px;font-size:.85rem;font-weight:600;border:none;cursor:pointer;transition:opacity .15s;white-space:nowrap;font-family:inherit;line-height:1}
.btn-pri{background:var(--pri);color:#fff}
.btn-out{background:transparent;color:var(--pri);border:1.5px solid var(--pri)}
.btn:hover{opacity:.82}
.show-more{display:flex;justify-content:center;margin-top:28px}
.tbl-wrap{background:var(--surf);border:1px solid var(--border);border-radius:var(--rlg);overflow:hidden;box-shadow:var(--shadow);margin-top:8px}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th{padding:11px 14px;text-align:left;font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);background:var(--surf2);border-bottom:1px solid var(--border)}
td{padding:13px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surf2)}
td strong{font-weight:600}
td a{font-weight:600}
.reviews-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.review{background:var(--surf);border:1px solid var(--border);border-radius:var(--rlg);padding:20px;box-shadow:var(--shadow);font-size:.88rem}
.rv-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px}
.rv-user{display:flex;align-items:center;gap:10px}
.rv-ava{width:38px;height:38px;border-radius:999px;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700;color:var(--muted);flex-shrink:0}
.rv-name{font-weight:600;font-size:.9rem}
.rv-city{font-size:.78rem;color:var(--muted)}
.rv-service{font-size:.78rem;color:var(--pri);font-weight:600;white-space:nowrap}
.rv-body{color:var(--text);margin-bottom:10px;line-height:1.55}
.rv-meta{font-size:.75rem;color:var(--muted)}
.faq-list{display:flex;flex-direction:column;gap:0}
.faq-item{border-bottom:1px solid var(--border)}
.faq-item:first-child{border-top:1px solid var(--border)}
.faq-btn{width:100%;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 4px;background:none;border:none;cursor:pointer;font-family:inherit;font-size:.97rem;font-weight:600;color:var(--text);text-align:left}
.faq-icon{width:22px;height:22px;border-radius:999px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.9rem;color:var(--muted);transition:transform .2s}
.faq-body{display:none;font-size:.88rem;color:var(--muted);line-height:1.65;padding:0 4px 18px}
.faq-item.open .faq-body{display:block}
.faq-item.open .faq-icon{transform:rotate(45deg);border-color:var(--pri);color:var(--pri)}
footer{background:var(--surf);border-top:1px solid var(--border);padding:48px 0 24px;margin-top:40px}
.footer-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:40px;margin-bottom:40px}
.footer-logo{font-family:"Manrope",sans-serif;font-weight:800;font-size:1.1rem;color:var(--text);margin-bottom:12px}
.footer-logo em{color:var(--pri);font-style:normal}
.footer-about{font-size:.83rem;color:var(--muted);line-height:1.6;margin-bottom:16px;max-width:280px}
.footer-links-row{display:flex;flex-direction:column;gap:6px}
.footer-links-row a{font-size:.8rem;color:var(--muted)}
.footer-links-row a:hover{color:var(--pri)}
.footer-heading{font-family:"Manrope",sans-serif;font-weight:700;font-size:.82rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text);margin-bottom:14px}
.footer-nav{list-style:none;display:flex;flex-direction:column;gap:7px}
.footer-nav a{font-size:.83rem;color:var(--muted)}
.footer-nav a:hover{color:var(--pri)}
.footer-bottom{border-top:1px solid var(--border);padding-top:20px;display:flex;justify-content:space-between;align-items:center;font-size:.78rem;color:var(--muted);flex-wrap:wrap;gap:8px}
@media(max-width:768px){.footer-grid{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.sec-head{flex-direction:column;align-items:flex-start}.card-specs{grid-template-columns:1fr}.card-foot{flex-direction:column;align-items:flex-start}.rv-head{flex-direction:column;align-items:flex-start}}
@media(max-width:480px){.footer-grid{grid-template-columns:1fr}}
</style>
</head>
